server:
  port: 8070

spring:
  application:
    name: devops-ai

  datasource:
    url: jdbc:h2:file:../data/devops-ai;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false
    encoding: UTF-8

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

logging:
  level:
    com.devops.ai: INFO
    org.gitlab4j: WARN
  file:
    path: ./logs
    name: ./logs/devops-ai.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

devops:
  ai:
    encrypt:
      key: devops-ai-secret-key-2026
    generator:
      output-dir: ./output
      default-template: standard
      default-format: markdown
    cache:
      project-ttl-minutes: 60
      branch-ttl-minutes: 5
    task:
      max-concurrent: 5

# ================================================================
# OCR (open-code-review) MCP server integration
# ================================================================
ocr:
  bin:
    path: "../bin/ocr.exe"  # 相对于 devops-ai 根目录的 ocr 二进制
  timeout-minutes: 30                        # OCR 子进程审查超时时间
  scan-concurrency: 4                        # 深度扫描文件并发数
  scan-batch-size: 20                        # OCR 子进程模式每批文件数（旧模式）
  model: ""                                  # OCR 使用模型，空则用 llm.modelName
  fallback-on-error: true                    # OCR 出错时是否回退到旧的 CodeReviewAiService
  deep-scan:
    max-source-chars: 12000                  # 单文件源码截断阈值（字符数）
    max-chunk-chars: 30000                   # 多轮对话每块最大字符数（约 10000 tokens）
    retry-count: 1                           # 单文件 LLM 调用失败重试次数
