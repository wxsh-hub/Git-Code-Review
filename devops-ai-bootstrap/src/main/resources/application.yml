server:
  port: 8080

spring:
  application:
    name: devops-ai

  datasource:
    url: jdbc:h2:file:./data/devops-ai;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false
    encoding: UTF-8

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

logging:
  level:
    com.devops.ai: INFO
    org.gitlab4j: WARN
  file:
    path: ./logs
    name: ./logs/devops-ai.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

devops:
  ai:
    encrypt:
      key: devops-ai-secret-key-2026
    generator:
      output-dir: ./output
      default-template: standard
      default-format: markdown
    cache:
      project-ttl-minutes: 60
      branch-ttl-minutes: 5
    task:
      max-concurrent: 5
