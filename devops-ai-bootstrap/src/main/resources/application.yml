server:
  port: 8070

spring:
  application:
    name: devops-ai

  datasource:
    url: jdbc:h2:file:../data/devops-ai;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false
    encoding: UTF-8

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

logging:
  level:
    com.devops.ai: INFO
    org.gitlab4j: WARN
  file:
    path: ./logs
    name: ./logs/devops-ai.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

devops:
  ai:
    encrypt:
      key: devops-ai-secret-key-2026
    generator:
      output-dir: ./output
      default-template: standard
      default-format: markdown
    cache:
      project-ttl-minutes: 60
      branch-ttl-minutes: 5
    task:
      max-concurrent: 5

# ================================================================
# 审查引擎配置
# ================================================================
ocr:
  scan-concurrency: 4                        # 深度扫描文件并发数
  model: ""                                  # 审查使用模型，空则用 llm.modelName
  deep-scan:
    max-source-chars: 12000                  # 单文件源码截断阈值（字符数）
    max-chunk-chars: 30000                   # 多轮对话每块最大字符数（约 10000 tokens）
    max-grep-rounds: 10                      # 迭代 grep 最大轮次
    max-grep-per-round: 5                    # 每轮最大 grep 请求数

# ================================================================
# CRG (code-review-graph) 依赖分析集成
# ================================================================
crg:
  enabled: true                               # 是否启用 CRG（关闭后完全走原逻辑）
  url: http://localhost:9527                  # CRG MCP HTTP 服务地址
  connect-timeout: 10000                      # HTTP 连接超时（毫秒）
  read-timeout: 120000                        # HTTP 读取超时 — 查询类操作（毫秒，默认 2 分钟）
  build-read-timeout: 1800000                 # HTTP 读取超时 — 构建操作（毫秒，默认 30 分钟）
  summary:
    top-fanin-methods: 10                      # 全局摘要 — 高扇入方法数量
    top-flows: 5                               # 全局摘要 — 执行流数量
    fanin-threshold: 3                         # 高扇入阈值（被 >= 此数的方法调用）
  query:
    max-callers: 5                             # callers_of 最大返回数
    max-callees: 5                             # callees_of 最大返回数
