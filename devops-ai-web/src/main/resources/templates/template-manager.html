<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模板管理 - devops-ai</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div th:replace="fragments/sidebar :: sidebar"></div>
<div class="main-content">
    <h2 class="mb-4">模板管理</h2>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card">
        <div class="card-header">
            <span>文档模板列表</span>
            <button class="btn btn-sm btn-primary float-end" onclick="openEdit(null)">新增自定义模板</button>
        </div>
        <div class="card-body">
            <table class="table">
                <thead>
                <tr>
                    <th>模板名称</th>
                    <th>显示名称</th>
                    <th>描述</th>
                    <th>类型</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="template : ${templates}">
                    <td th:text="${template.name}">-</td>
                    <td th:text="${template.displayName}">-</td>
                    <td th:text="${template.description}">-</td>
                    <td>
                        <span class="badge" th:classappend="${template.builtIn} ? 'bg-secondary' : 'bg-primary'"
                              th:text="${template.builtIn} ? '内置' : '自定义'">-</span>
                    </td>
                    <td>
                        <button class="btn btn-sm btn-info edit-btn" th:data-name="${template.name}">修改</button>
                        <button class="btn btn-sm btn-secondary preview-btn" th:data-name="${template.name}">预览</button>
                        <form action="/templates/delete" method="post" style="display:inline"
                              th:if="${not template.builtIn}">
                            <input type="hidden" name="name" th:value="${template.name}">
                            <button type="submit" class="btn btn-sm btn-danger">删除</button>
                        </form>
                        <form th:action="@{/templates/reset/{name}(name=${template.name})}" method="post" style="display:inline"
                              th:if="${template.builtIn}">
                            <button type="submit" class="btn btn-sm btn-warning" onclick="return confirm('确认恢复为系统默认内容？')">恢复默认</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card mt-4">
        <div class="card-header">模板变量说明</div>
        <div class="card-body">
            <table class="table">
                <thead>
                <tr>
                    <th>变量名</th>
                    <th>类型</th>
                    <th>说明</th>
                </tr>
                </thead>
                <tbody>
                <tr><td>${projectName}</td><td>String</td><td>项目名称</td></tr>
                <tr><td>${projectVersion}</td><td>String</td><td>项目版本号</td></tr>
                <tr><td>${branch}</td><td>String</td><td>分支名称</td></tr>
                <tr><td>${buildTime}</td><td>String</td><td>构建/生成时间</td></tr>
                <tr><td>${dateRange}</td><td>String</td><td>时间范围</td></tr>
                <tr><td>${categories}</td><td>String</td><td>分类内容（自动渲染）</td></tr>
                <tr><td>${totalCommits}</td><td>int</td><td>提交总数</td></tr>
                <tr><td>${totalAuthors}</td><td>int</td><td>参与开发者数</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="editModalTitle">编辑模板</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form action="/templates/save" method="post">
                <div class="modal-body">
                    <input type="hidden" name="builtIn" value="false">
                    <div class="mb-3">
                        <label class="form-label">模板名称</label>
                        <input type="text" name="name" id="editName" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">显示名称</label>
                        <input type="text" name="displayName" id="editDisplayName" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">描述</label>
                        <input type="text" name="description" id="editDescription" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">模板内容</label>
                        <textarea name="content" id="editContent" class="form-control" rows="10" style="font-family: monospace;" required></textarea>
                    </div>
                    <div class="mb-3">
                        <button type="button" class="btn btn-secondary" onclick="doPreview()">预览模板</button>
                    </div>
                    <div class="mb-3" id="previewArea" style="display:none;">
                        <label class="form-label">预览结果</label>
                        <div id="previewContent" class="border p-3" style="background:#f8f9fa;white-space:pre-wrap;font-family: monospace;max-height:300px;overflow-y:auto;"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="/js/bootstrap.bundle.min.js"></script>
<script>
var editModal = null;
document.addEventListener('DOMContentLoaded', function() {
    editModal = new bootstrap.Modal(document.getElementById('editModal'));

    document.querySelector('.card-body .table').addEventListener('click', function(e) {
        var target = e.target;
        if (target.classList.contains('edit-btn')) {
            openEdit(target.getAttribute('data-name'));
        } else if (target.classList.contains('preview-btn')) {
            previewTemplate(target.getAttribute('data-name'));
        }
    });
});

function openEdit(name) {
    document.getElementById('previewArea').style.display = 'none';
    if (name) {
        document.getElementById('editModalTitle').textContent = '编辑模板 - ' + name;
        fetch('/templates/' + encodeURIComponent(name))
            .then(function(r) { return r.json(); })
            .then(function(t) {
                document.getElementById('editName').value = t.name;
                document.getElementById('editName').readOnly = t.builtIn;
                document.getElementById('editDisplayName').value = t.displayName;
                document.getElementById('editDescription').value = t.description || '';
                document.getElementById('editContent').value = t.content;
                if (editModal) { editModal.show(); } else { alert('请先加载 Bootstrap'); }
            })
            .catch(function(e) { alert('加载模板失败: ' + e.message); });
    } else {
        document.getElementById('editModalTitle').textContent = '新增自定义模板';
        document.getElementById('editName').value = '';
        document.getElementById('editName').readOnly = false;
        document.getElementById('editDisplayName').value = '';
        document.getElementById('editDescription').value = '';
        document.getElementById('editContent').value = '# ${projectName} 更新日志\n\n${categories}';
        if (editModal) { editModal.show(); } else { alert('请先加载 Bootstrap'); }
    }
}

function doPreview() {
    var content = document.getElementById('editContent').value;
    if (!content) { alert('请先输入模板内容'); return; }
    document.getElementById('previewArea').style.display = 'none';

    var formData = new URLSearchParams();
    formData.append('content', content);

    fetch('/templates/preview', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: formData.toString()
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        document.getElementById('previewContent').textContent = data.content;
        document.getElementById('previewArea').style.display = '';
    })
    .catch(function(e) { alert('预览失败: ' + e.message); });
}

function previewTemplate(name) {
    fetch('/templates/' + encodeURIComponent(name))
        .then(function(r) { return r.json(); })
        .then(function(t) {
            document.getElementById('editContent').value = t.content;
            doPreview();
        })
        .catch(function(e) { alert('加载模板失败: ' + e.message); });
}
</script>
</body>
</html>
