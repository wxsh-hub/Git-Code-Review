<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: header">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 模型配置 - devops-ai</title>
</head>
<body class="bg-[#0A0E14] text-[#E2E8F0] min-h-screen antialiased">
<div th:replace="fragments/sidebar :: sidebar"></div>
<div class="ml-56 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <div class="mb-8">
            <h1 class="text-xl font-semibold text-[#F8FAFC] tracking-tight">AI 模型配置</h1>
            <p class="text-sm text-[#64748B] mt-1">配置 LLM 模型参数用于 AI 智能分析</p>
        </div>

        <div class="bg-[#0F172A] rounded-xl border border-[#1E293B]">
            <div class="px-6 py-4 border-b border-[#1E293B]">
                <h3 class="text-sm font-medium text-[#F8FAFC]">LLM 模型设置</h3>
            </div>
            <div class="p-6">
                <form action="/config/ai" method="post" th:action="@{/config/ai}">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-medium text-[#94A3B8] mb-1.5">模型供应商</label>
                            <select name="provider" class="input-field w-full bg-[#0A0E14] border border-[#1E293B] rounded-lg px-3 py-2.5 text-sm text-[#E2E8F0] focus:outline-none" id="providerSelect">
                                <option value="deepseek" th:selected="${provider == 'deepseek'}" class="bg-[#0F172A]">DeepSeek</option>
                                <option value="openai" th:selected="${provider == 'openai'}" class="bg-[#0F172A]">OpenAI</option>
                                <option value="anthropic" th:selected="${provider == 'anthropic'}" class="bg-[#0F172A]">Anthropic</option>
                            </select>
                            <p class="mt-1 text-xs text-[#64748B]">选择 AI 模型供应商</p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-[#94A3B8] mb-1.5">模型 ID</label>
                            <input type="text" name="modelName" class="input-field w-full bg-[#0A0E14] border border-[#1E293B] rounded-lg px-3 py-2.5 text-sm text-[#E2E8F0] focus:outline-none" th:value="${modelName}" placeholder="deepseek-chat">
                            <p class="mt-1 text-xs text-[#64748B]">例如: deepseek-chat, gpt-4o-mini, claude-3-haiku</p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-[#94A3B8] mb-1.5">自定义请求地址</label>
                            <input type="url" name="apiUrl" class="input-field w-full bg-[#0A0E14] border border-[#1E293B] rounded-lg px-3 py-2.5 text-sm text-[#E2E8F0] focus:outline-none" th:value="${apiUrl}" placeholder="https://api.deepseek.com" id="apiUrlInput">
                            <p class="mt-1 text-xs text-[#64748B]">留空则使用供应商默认地址</p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-[#94A3B8] mb-1.5">API 密钥</label>
                            <input type="password" name="apiKey" class="input-field w-full bg-[#0A0E14] border border-[#1E293B] rounded-lg px-3 py-2.5 text-sm text-[#E2E8F0] focus:outline-none" th:value="${apiKey}" required>
                            <p class="mt-1 text-xs text-[#64748B]">密钥将加密存储</p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-[#94A3B8] mb-1.5">温度参数 (Temperature)</label>
                            <input type="number" name="temperature" class="input-field w-full bg-[#0A0E14] border border-[#1E293B] rounded-lg px-3 py-2.5 text-sm text-[#E2E8F0] focus:outline-none" step="0.1" min="0" max="2" th:value="${temperature}">
                            <p class="mt-1 text-xs text-[#64748B]">较低值 (0.1-0.3) 更准确，较高值 (0.7-1.0) 更有创意</p>
                        </div>
                    </div>

                    <div id="testResult" class="mb-4" style="display:none;"></div>

                    <div class="flex gap-3 mt-6">
                        <button type="button" class="btn-ghost inline-flex items-center gap-2 px-5 py-2.5 rounded-lg border border-[#1E293B] text-sm text-[#94A3B8] cursor-pointer bg-transparent hover:text-[#F8FAFC]" onclick="testConnection()">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                            </svg>
                            测试连接
                        </button>
                        <button type="submit" class="btn-primary inline-flex items-center gap-2 px-5 py-2.5 rounded-lg bg-[#22C55E] text-[#0F172A] text-sm font-semibold border-none cursor-pointer">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                            </svg>
                            保存配置
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div class="bg-[#0F172A] rounded-xl border border-[#1E293B] mt-5">
            <div class="px-6 py-4 border-b border-[#1E293B]">
                <h3 class="text-sm font-medium text-[#F8FAFC]">配置说明</h3>
            </div>
            <div class="p-6">
                <ul class="space-y-2 text-sm text-[#94A3B8]">
                    <li class="flex items-start gap-2">
                        <svg class="w-4 h-4 mt-0.5 text-[#22C55E] shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4"/></svg>
                        AI 分类功能需要配置有效的 API 密钥才能使用
                    </li>
                    <li class="flex items-start gap-2">
                        <svg class="w-4 h-4 mt-0.5 text-[#22C55E] shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4"/></svg>
                        未配置 AI 时将自动使用规则分类作为后备方案
                    </li>
                    <li class="flex items-start gap-2">
                        <svg class="w-4 h-4 mt-0.5 text-[#22C55E] shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4"/></svg>
                        温度参数建议设置在 0.1-0.3 之间以保证分类准确性
                    </li>
                    <li class="flex items-start gap-2">
                        <svg class="w-4 h-4 mt-0.5 text-[#22C55E] shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4"/></svg>
                        切换供应商时，请求地址和模型 ID 会自动填充默认值
                    </li>
                </ul>
            </div>
        </div>
    </div>
</div>

<script>
    var defaults = {
        deepseek: { url: 'https://api.deepseek.com', model: 'deepseek-chat' },
        openai: { url: 'https://api.openai.com', model: 'gpt-4o-mini' },
        anthropic: { url: 'https://api.anthropic.com', model: 'claude-3-haiku' }
    };

    document.getElementById('providerSelect').addEventListener('change', function() {
        var provider = this.value;
        var cfg = defaults[provider];
        var urlInput = document.getElementById('apiUrlInput');
        var modelInput = document.querySelector('input[name="modelName"]');
        if (urlInput && !urlInput.value) urlInput.value = cfg.url;
        if (modelInput && !modelInput.value) modelInput.value = cfg.model;
    });

    function testConnection() {
        var resultDiv = document.getElementById('testResult');
        resultDiv.style.display = 'block';
        resultDiv.className = 'mb-4 px-4 py-3 rounded-lg bg-[#3B82F6]/10 border border-[#3B82F6]/20 text-sm text-[#3B82F6]';
        resultDiv.textContent = '正在测试连接...';

        var form = document.querySelector('form');
        var data = new URLSearchParams();
        data.append('provider', document.querySelector('select[name="provider"]').value);
        data.append('apiUrl', document.querySelector('input[name="apiUrl"]').value);
        data.append('modelName', document.querySelector('input[name="modelName"]').value);
        data.append('apiKey', document.querySelector('input[name="apiKey"]').value);

        fetch('/config/ai/test', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: data
        })
        .then(function(resp) { return resp.text(); })
        .then(function(text) {
            if (text.indexOf('成功') !== -1) {
                resultDiv.className = 'mb-4 px-4 py-3 rounded-lg bg-[#22C55E]/10 border border-[#22C55E]/20 text-sm text-[#22C55E]';
            } else {
                resultDiv.className = 'mb-4 px-4 py-3 rounded-lg bg-red-500/10 border border-red-500/20 text-sm text-red-400';
            }
            resultDiv.textContent = text;
        })
        .catch(function(err) {
            resultDiv.className = 'mb-4 px-4 py-3 rounded-lg bg-red-500/10 border border-red-500/20 text-sm text-red-400';
            resultDiv.textContent = '请求失败: ' + err.message;
        });
    }
</script>
</body>
</html>
