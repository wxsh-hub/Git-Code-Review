<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="header">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>devops-ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/app.css">
    <!-- flatpickr date picker -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh.js"></script>
    <style>
        .sidebar-link { transition: all 0.15s ease; }
        .sidebar-link:hover { background: rgba(34, 197, 94, 0.08); color: #22C55E; }
        .sidebar-link.active { background: rgba(34, 197, 94, 0.12); color: #22C55E; border-right: 2px solid #22C55E; }
        .card-hover { transition: all 0.2s ease; }
        .card-hover:hover { border-color: #22C55E; box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.15); }
        .btn-primary { transition: all 0.15s ease; }
        .btn-primary:hover { background: #16A34A; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(34, 197, 94, 0.25); }
        .btn-ghost { transition: all 0.15s ease; }
        .btn-ghost:hover { background: rgba(255,255,255,0.08); }
        .input-field { transition: all 0.15s ease; }
        .input-field:focus { border-color: #22C55E; box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1); }
        select.input-field:focus { border-color: #22C55E; box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1); }
        .badge { transition: all 0.15s ease; }
        .fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        table th { font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.75rem; }
        .modal-overlay { animation: fadeOverlay 0.15s ease-out; }
        @keyframes fadeOverlay { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
</html>
