<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档生成 - devops-ai</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div th:replace="fragments/sidebar :: sidebar"></div>
<div class="main-content">
    <h2 class="mb-4">文档生成</h2>

    <div class="card">
        <div class="card-header">生成配置</div>
        <div class="card-body">
            <form action="/generate" method="post" th:action="@{/generate}">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">GitLab 配置</label>
                        <select name="configId" class="form-select" id="configSelect" required>
                            <option value="">-- 请选择 GitLab 配置 --</option>
                            <option th:each="cfg : ${configs}" th:value="${cfg.id}" th:text="${cfg.name}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">项目</label>
                        <select name="projectId" class="form-select" id="projectSelect" required disabled>
                            <option value="">-- 请先选择 GitLab 配置 --</option>
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">分支</label>
                        <select name="branch" class="form-select" id="branchSelect">
                            <option value="">默认分支</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">项目版本</label>
                        <input type="text" name="projectVersion" class="form-control" placeholder="例如: v1.0.0">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-12">
                        <label class="form-label">筛选方式</label>
                        <div class="d-flex gap-4">
                            <div class="form-check">
                                <input type="radio" name="filterMode" class="form-check-input" id="filterTime" value="time" checked>
                                <label class="form-check-label" for="filterTime">时间范围</label>
                            </div>
                            <div class="form-check">
                                <input type="radio" name="filterMode" class="form-check-input" id="filterHash" value="hash">
                                <label class="form-check-label" for="filterHash">Hash 范围</label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row mb-3" id="timeRangeGroup">
                    <div class="col-md-6">
                        <label class="form-label">起始时间</label>
                        <input type="datetime-local" name="since" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">截止时间</label>
                        <input type="datetime-local" name="until" class="form-control">
                    </div>
                </div>

                <div class="row mb-3" id="hashRangeGroup" style="display: none;">
                    <div class="col-md-6">
                        <label class="form-label">起始提交 Hash</label>
                        <input type="text" name="sinceHash" class="form-control" placeholder="可选项">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">截止提交 Hash</label>
                        <input type="text" name="untilHash" class="form-control" placeholder="可选项">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">作者筛选</label>
                        <select name="author" class="form-select" id="authorSelect">
                            <option value="">全部作者</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">输出格式</label>
                        <select name="format" class="form-select">
                            <option value="markdown" th:each="fmt : ${formats}"
                                    th:value="${fmt}" th:text="${fmt}">-</option>
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">文档模板</label>
                        <select name="templateName" class="form-select">
                            <option value="" th:each="template : ${templates}"
                                    th:value="${template.name}" th:text="${template.displayName}">-</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">分组维度</label>
                        <select name="dimensions" class="form-select" multiple>
                            <option value="" th:each="dim : ${dimensions}"
                                    th:value="${dim}" th:text="${dim}">-</option>
                        </select>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-4">
                        <div class="form-check">
                            <input type="checkbox" name="incremental" class="form-check-input" id="incremental" value="true">
                            <label class="form-check-label" for="incremental">增量生成</label>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-check">
                            <input type="checkbox" name="useAiClassifier" class="form-check-input" id="useAiClassifier" value="true">
                            <label class="form-check-label" for="useAiClassifier">AI 智能分析</label>
                        </div>
                    </div>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-primary btn-lg">开始生成</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
<script>
    var configSelect = document.getElementById('configSelect');
    var projectSelect = document.getElementById('projectSelect');
    var branchSelect = document.getElementById('branchSelect');
    var authorSelect = document.getElementById('authorSelect');

    function loadAuthors() {
        var configId = configSelect.value;
        var projectId = projectSelect.value;

        authorSelect.innerHTML = '<option value="">加载中...</option>';

        if (!configId) {
            authorSelect.innerHTML = '<option value="">全部作者</option>';
            return;
        }

        var url = '/generate/authors?configId=' + configId;
        if (projectId) {
            url += '&projectId=' + encodeURIComponent(projectId);
        }

        fetch(url)
            .then(function(resp) { return resp.json(); })
            .then(function(authors) {
                authorSelect.innerHTML = '<option value="">全部作者</option>';
                for (var i = 0; i < authors.length; i++) {
                    var opt = document.createElement('option');
                    opt.value = authors[i].name;
                    opt.textContent = authors[i].name + (authors[i].email ? ' (' + authors[i].email + ')' : '');
                    authorSelect.appendChild(opt);
                }
            })
            .catch(function(err) {
                authorSelect.innerHTML = '<option value="">全部作者</option>';
                console.error(err);
            });
    }

    configSelect.addEventListener('change', function() {
        var configId = this.value;
        projectSelect.innerHTML = '<option value="">加载中...</option>';
        projectSelect.disabled = true;
        branchSelect.innerHTML = '<option value="">默认分支</option>';
        authorSelect.innerHTML = '<option value="">全部作者</option>';

        if (!configId) {
            projectSelect.innerHTML = '<option value="">-- 请先选择 GitLab 配置 --</option>';
            return;
        }

        fetch('/generate/projects?configId=' + configId)
            .then(function(resp) { return resp.json(); })
            .then(function(projects) {
                projectSelect.innerHTML = '<option value="">-- 请选择项目 --</option>';
                for (var i = 0; i < projects.length; i++) {
                    var opt = document.createElement('option');
                    opt.value = projects[i].projectId;
                    opt.textContent = projects[i].projectName;
                    projectSelect.appendChild(opt);
                }
                projectSelect.disabled = false;
            })
            .catch(function(err) {
                projectSelect.innerHTML = '<option value="">加载失败</option>';
                console.error(err);
            });
    });

    projectSelect.addEventListener('change', function() {
        var configId = configSelect.value;
        var projectId = this.value;
        branchSelect.innerHTML = '<option value="">加载中...</option>';
        authorSelect.innerHTML = '<option value="">全部作者</option>';

        if (!configId || !projectId) {
            branchSelect.innerHTML = '<option value="">默认分支</option>';
            return;
        }

        fetch('/generate/branches?projectId=' + encodeURIComponent(projectId) + '&configId=' + configId)
            .then(function(resp) { return resp.json(); })
            .then(function(branches) {
                branchSelect.innerHTML = '<option value="">默认分支</option>';
                for (var i = 0; i < branches.length; i++) {
                    var opt = document.createElement('option');
                    opt.value = branches[i].name;
                    opt.textContent = branches[i].name;
                    branchSelect.appendChild(opt);
                }
                loadAuthors();
            })
            .catch(function(err) {
                branchSelect.innerHTML = '<option value="">默认分支</option>';
                console.error(err);
            });
    });

    document.querySelectorAll('input[name="filterMode"]').forEach(function(radio) {
        radio.addEventListener('change', function() {
            var timeGroup = document.getElementById('timeRangeGroup');
            var hashGroup = document.getElementById('hashRangeGroup');
            if (this.value === 'time') {
                timeGroup.style.display = 'flex';
                hashGroup.style.display = 'none';
                document.querySelector('input[name="sinceHash"]').value = '';
                document.querySelector('input[name="untilHash"]').value = '';
            } else {
                timeGroup.style.display = 'none';
                hashGroup.style.display = 'flex';
                document.querySelector('input[name="since"]').value = '';
                document.querySelector('input[name="until"]').value = '';
            }
        });
    });

    document.getElementById('incremental').addEventListener('change', function() {
    });

    document.querySelector('form').addEventListener('submit', function() {
        var filterMode = document.querySelector('input[name="filterMode"]:checked');
        if (filterMode) {
            if (filterMode.value === 'hash') {
                document.querySelector('input[name="since"]').value = '';
                document.querySelector('input[name="until"]').value = '';
            } else {
                document.querySelector('input[name="sinceHash"]').value = '';
                document.querySelector('input[name="untilHash"]').value = '';
            }
        }

        var since = document.querySelector('input[name="since"]');
        var until = document.querySelector('input[name="until"]');
        [since, until].forEach(function(input) {
            if (!input.value) return;
            input.value = input.value.replace('T', ' ');
            if (input.value.indexOf(':') > 0) {
                var parts = input.value.split(':');
                if (parts.length < 3) { input.value += ':00'; }
            }
        });
    });
</script>
</html>
